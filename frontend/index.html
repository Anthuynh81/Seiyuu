<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seiyuu</title>
    <style>html{background:#1a1a17}html[data-theme="light"]{background:#e8e3d7}</style>
    <script>
      // Stamp the theme before first paint so neither theme flashes. Mirrors useTheme.
      (function () {
        var pref = null;
        try { pref = localStorage.getItem("seiyuu-theme"); } catch (e) { /* private mode */ }
        var light =
          pref === "daylight" ||
          (pref !== "booth" && matchMedia("(prefers-color-scheme: light)").matches);
        document.documentElement.dataset.theme = light ? "light" : "dark";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
